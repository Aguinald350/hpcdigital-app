<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Gerar link verificação — Admin</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        body { font-family: Arial, sans-serif; padding: 16px; background:#f7f7f8 }
        .card { background:white; padding:20px; border-radius:8px; max-width:720px; margin:20px auto; box-shadow:0 6px 18px rgba(0,0,0,0.06) }
        input,button{ padding:10px; font-size:14px }
        .row{ display:flex; gap:8px }
    </style>
</head>
<body>
<div class="card">
    <h2>Gerar link de verificação (Admin)</h2>
    <p>Autentica-te com a conta admin (custom claim `admin: true`) e insere o email do utilizador.</p>

    <div id="authArea">
        <div id="userInfo"></div>
        <div id="login" style="margin-bottom:12px;">
            <input id="emailLogin" placeholder="admin email" />
            <input id="pwdLogin" type="password" placeholder="password" />
            <button id="btnLogin">Fazer login</button>
            <button id="btnLogout" style="display:none">Logout</button>
        </div>
    </div>

    <div style="margin-top:12px;">
        <div class="row">
            <input id="targetEmail" placeholder="email@usuario.com" style="flex:1" />
            <button id="btnGenerate">Gerar e Enviar</button>
        </div>
        <p id="status" style="color:#333"></p>
        <div id="result" style="margin-top:12px;"></div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
    // ========== CONFIG: coloca o teu firebaseConfig aqui ==========
    const firebaseConfig = {
      apiKey: "TUO_API_KEY",
      authDomain: "TUO_PROJECT.firebaseapp.com",
      projectId: "TUO_PROJECT",
      // ...opcionais
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const btnLogin = document.getElementById('btnLogin');
    const btnLogout = document.getElementById('btnLogout');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const userInfo = document.getElementById('userInfo');

    btnLogin.onclick = async () => {
      const e = document.getElementById('emailLogin').value;
      const p = document.getElementById('pwdLogin').value;
      if (!e || !p) { alert('preenche email e password'); return; }
      try {
        status.innerText = 'A autenticar...';
        await auth.signInWithEmailAndPassword(e, p);
      } catch (err) {
        alert('Erro login: ' + err.message);
      } finally {
        status.innerText = '';
      }
    };

    btnLogout.onclick = async () => {
      await auth.signOut();
    };

    auth.onAuthStateChanged(async (u) => {
      if (u) {
        btnLogout.style.display = '';
        btnLogin.style.display = 'none';
        userInfo.innerText = `Autenticado como: ${u.email}`;
      } else {
        btnLogout.style.display = 'none';
        btnLogin.style.display = '';
        userInfo.innerText = 'Não autenticado';
      }
    });

    document.getElementById('btnGenerate').onclick = async () => {
      const email = document.getElementById('targetEmail').value.trim();
      if (!email) { alert('Insere um email'); return; }
      const user = auth.currentUser;
      if (!user) { alert('Faz login com uma conta de admin antes'); return; }

      status.innerText = 'A obter token...';
      result.innerHTML = '';
      try {
        const idToken = await user.getIdToken(/* forceRefresh */ true);

        // chama a função HTTPS
        status.innerText = 'A chamar função...';
        const resp = await fetch('/__/generateVerificationLink', { // ver abaixo: configuração do rewrite
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + idToken,
          },
          body: JSON.stringify({ email })
        });

        const json = await resp.json();
        if (!resp.ok) {
          status.innerText = 'Erro: ' + (json && json.error ? json.error : resp.status);
          return;
        }

        status.innerText = 'Enviado com sucesso.';
        if (json.link) {
          result.innerHTML = `<div>Link (retornado): <br/><code>${json.link}</code></div>`;
        } else {
          result.innerHTML = `<div>Enviado por email (SendGrid).</div>`;
        }
      } catch (err) {
        status.innerText = 'Erro: ' + err.message;
      }
    };
</script>
</body>
</html>
