# Safe gradle properties for low-memory systems
org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8
# disable daemon to avoid crashes when system memory is tight
org.gradle.daemon=false
org.gradle.parallel=false
kotlin.daemon.jvm.options=-Xmx1024m
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
kotlin.incremental.usePreciseJavaTracking=false
# keep pointing to JBR (if valid)
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr